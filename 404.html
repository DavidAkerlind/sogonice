<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<script>
			// GitHub Pages SPA redirect: store the path and redirect to index
			var seg =
				window.location.pathname.replace(/^\/sogonice/, '') || '/';
			sessionStorage.setItem(
				'spa-redirect',
				seg + window.location.search + window.location.hash,
			);
			window.location.replace('/sogonice/');
		</script>
	</head>
	<body></body>
</html>
